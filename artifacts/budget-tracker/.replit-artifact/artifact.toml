kind = "web"
previewPath = "/"
title = "Budget Tracker"
version = "1.0.0"
id = "artifacts/budget-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18541
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/budget-tracker run dev"

[services.env]
PORT = "18541"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/budget-tracker", "run", "build"]
publicDir = "artifacts/budget-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
